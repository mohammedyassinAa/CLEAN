<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300" width="400" height="300">
  <defs>
    <linearGradient id="pestbg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ecfdf5"/>
      <stop offset="100%" stop-color="#d1fae5"/>
    </linearGradient>
    <linearGradient id="shieldGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#10b981"/>
      <stop offset="100%" stop-color="#059669"/>
    </linearGradient>
    <linearGradient id="shieldShine" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="white" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="white" stop-opacity="0"/>
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="400" height="300" fill="url(#pestbg)"/>
  <!-- House silhouette (background) -->
  <polygon points="200,30 330,110 330,240 70,240 70,110" fill="#e2e8f0" opacity="0.6"/>
  <polygon points="200,25 345,112 55,112" fill="#d1d5db" opacity="0.6"/>
  <!-- Door -->
  <rect x="175" y="180" width="50" height="60" fill="#94a3b8" opacity="0.7" rx="3"/>
  <!-- Windows -->
  <rect x="100" y="140" width="50" height="40" fill="#bae6fd" opacity="0.7" rx="3"/>
  <rect x="250" y="140" width="50" height="40" fill="#bae6fd" opacity="0.7" rx="3"/>
  <!-- Large protective shield (center front) -->
  <path d="M200 70 L270 100 L270 170 Q270 220 200 245 Q130 220 130 170 L130 100 Z" fill="url(#shieldGrad)" opacity="0.95"/>
  <!-- Shield shine -->
  <path d="M200 70 L270 100 L270 170 Q270 220 200 245 Q130 220 130 170 L130 100 Z" fill="url(#shieldShine)"/>
  <!-- Shield border -->
  <path d="M200 70 L270 100 L270 170 Q270 220 200 245 Q130 220 130 170 L130 100 Z" fill="none" stroke="white" stroke-width="3" opacity="0.6"/>
  <!-- Checkmark inside shield -->
  <path d="M168 158 L190 180 L232 135" stroke="white" stroke-width="8" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- Crossed-out bug icon (pest symbol) -->
  <!-- Bug body (small, top-right corner) -->
  <ellipse cx="330" cy="60" rx="18" ry="12" fill="#78350f" opacity="0.7"/>
  <circle cx="330" cy="48" r="9" fill="#92400e" opacity="0.7"/>
  <!-- Bug legs -->
  <line x1="315" y1="58" x2="300" y2="50" stroke="#78350f" stroke-width="2" opacity="0.6"/>
  <line x1="315" y1="63" x2="298" y2="63" stroke="#78350f" stroke-width="2" opacity="0.6"/>
  <line x1="315" y1="68" x2="300" y2="76" stroke="#78350f" stroke-width="2" opacity="0.6"/>
  <line x1="345" y1="58" x2="360" y2="50" stroke="#78350f" stroke-width="2" opacity="0.6"/>
  <line x1="345" y1="63" x2="362" y2="63" stroke="#78350f" stroke-width="2" opacity="0.6"/>
  <line x1="345" y1="68" x2="360" y2="76" stroke="#78350f" stroke-width="2" opacity="0.6"/>
  <!-- Red X over bug -->
  <line x1="308" y1="40" x2="355" y2="82" stroke="#ef4444" stroke-width="5" stroke-linecap="round" opacity="0.9"/>
  <line x1="355" y1="40" x2="308" y2="82" stroke="#ef4444" stroke-width="5" stroke-linecap="round" opacity="0.9"/>
  <!-- Spray can (bottom left) -->
  <rect x="40" y="185" width="30" height="55" fill="#0ea5e9" rx="5"/>
  <rect x="43" y="180" width="24" height="10" fill="#0284c7" rx="3"/>
  <rect x="48" y="172" width="14" height="10" fill="#0369a1" rx="2"/>
  <!-- Spray nozzle -->
  <path d="M62 180 Q75 175 80 182 Q85 188 78 195" stroke="#0ea5e9" stroke-width="2" fill="none"/>
  <!-- Spray dots -->
  <circle cx="85" cy="188" r="2.5" fill="#a5f3fc" opacity="0.8"/>
  <circle cx="91" cy="185" r="2" fill="#a5f3fc" opacity="0.7"/>
  <circle cx="90" cy="194" r="2" fill="#a5f3fc" opacity="0.6"/>
  <circle cx="97" cy="190" r="1.5" fill="#a5f3fc" opacity="0.5"/>
  <!-- Bottom label -->
  <rect y="268" width="400" height="32" fill="#059669" opacity="0.9"/>
  <text x="200" y="289" font-family="Arial,sans-serif" font-size="13" font-weight="bold" fill="white" text-anchor="middle">Dératisation &amp; Désinsectisation</text>
</svg>
