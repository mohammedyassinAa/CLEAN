<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300" width="400" height="300">
  <defs>
    <linearGradient id="roombg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f1f5f9"/>
      <stop offset="100%" stop-color="#e2e8f0"/>
    </linearGradient>
    <linearGradient id="floor" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#fef3c7"/>
      <stop offset="100%" stop-color="#fde68a"/>
    </linearGradient>
  </defs>
  <!-- Room background -->
  <rect width="400" height="300" fill="url(#roombg)"/>
  <!-- Floor -->
  <rect y="220" width="400" height="80" fill="url(#floor)"/>
  <!-- Wall trim -->
  <rect y="218" width="400" height="5" fill="#d1d5db"/>
  <!-- Window on wall -->
  <rect x="280" y="40" width="100" height="100" fill="#bae6fd" rx="4" stroke="#94a3b8" stroke-width="2"/>
  <line x1="330" y1="40" x2="330" y2="140" stroke="#94a3b8" stroke-width="2"/>
  <line x1="280" y1="90" x2="380" y2="90" stroke="#94a3b8" stroke-width="2"/>
  <!-- Curtains -->
  <path d="M278 38 Q268 80 272 140" fill="#fbbf24" opacity="0.7" stroke="#f59e0b" stroke-width="1"/>
  <path d="M382 38 Q392 80 388 140" fill="#fbbf24" opacity="0.7" stroke="#f59e0b" stroke-width="1"/>
  <!-- Sunlight rays through window -->
  <line x1="330" y1="140" x2="260" y2="220" stroke="#fde68a" stroke-width="3" opacity="0.5"/>
  <line x1="355" y1="140" x2="310" y2="220" stroke="#fde68a" stroke-width="2" opacity="0.4"/>
  <!-- Sofa (simplified) -->
  <rect x="20" y="160" width="200" height="60" fill="#94a3b8" rx="8"/>
  <rect x="20" y="148" width="200" height="20" fill="#cbd5e1" rx="4"/>
  <rect x="20" y="160" width="20" height="60" fill="#64748b" rx="4"/>
  <rect x="200" y="160" width="20" height="60" fill="#64748b" rx="4"/>
  <!-- Cleaning lady -->
  <circle cx="270" cy="175" r="14" fill="#fbbf24"/>
  <rect x="258" y="189" width="24" height="31" fill="#0ea5e9" rx="5"/>
  <!-- Mop handle -->
  <rect x="280" y="172" width="4" height="70" fill="#92400e" rx="2"/>
  <!-- Mop head / water swirl -->
  <ellipse cx="282" cy="244" rx="16" ry="8" fill="#bfdbfe"/>
  <path d="M268 244 Q282 236 296 244" stroke="#60a5fa" stroke-width="2" fill="none"/>
  <!-- Shine sparkles on cleaned floor -->
  <path d="M90 230 L94 224 L98 230 L94 236Z" fill="#fde68a" opacity="0.8"/>
  <path d="M140 240 L143 235 L146 240 L143 245Z" fill="#fde68a" opacity="0.7"/>
  <path d="M50 238 L53 233 L56 238 L53 243Z" fill="#fde68a" opacity="0.6"/>
  <!-- Cleaning products on floor -->
  <rect x="310" y="200" width="18" height="35" fill="#0ea5e9" rx="4"/>
  <rect x="306" y="196" width="26" height="8" fill="#0284c7" rx="2"/>
  <rect x="334" y="205" width="16" height="30" fill="#10b981" rx="4"/>
  <rect x="330" y="201" width="24" height="7" fill="#059669" rx="2"/>
  <!-- Bottom accent -->
  <rect y="270" width="400" height="30" fill="#0284c7" opacity="0.85"/>
  <text x="200" y="290" font-family="Arial,sans-serif" font-size="14" font-weight="bold" fill="white" text-anchor="middle">Femmes de Ménage</text>
</svg>
