<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300" width="400" height="300">
  <defs>
    <linearGradient id="skybg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0ea5e9"/>
      <stop offset="100%" stop-color="#38bdf8"/>
    </linearGradient>
    <linearGradient id="glass" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#bfdbfe" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#dbeafe" stop-opacity="0.7"/>
    </linearGradient>
    <linearGradient id="clean" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#e0f2fe" stop-opacity="0.5"/>
    </linearGradient>
  </defs>
  <!-- Background (building facade) -->
  <rect width="400" height="300" fill="#e2e8f0"/>
  <!-- Sky visible at top -->
  <rect width="400" height="80" fill="url(#skybg)"/>
  <!-- Building facade sections -->
  <rect x="0" y="80" width="400" height="220" fill="#cbd5e1"/>
  <!-- Window 1 – large, being cleaned -->
  <rect x="30" y="100" width="150" height="110" fill="url(#glass)" rx="4" stroke="#94a3b8" stroke-width="2"/>
  <!-- Squeegee cleaning path -->
  <rect x="30" y="100" width="90" height="110" fill="url(#clean)" rx="4"/>
  <line x1="120" y1="100" x2="120" y2="210" stroke="#0ea5e9" stroke-width="3" stroke-dasharray="4,2"/>
  <!-- Squeegee tool -->
  <rect x="113" y="96" width="14" height="6" fill="#0284c7" rx="2"/>
  <rect x="118" y="86" width="4" height="14" fill="#374151" rx="2"/>
  <!-- Window 2 -->
  <rect x="220" y="100" width="150" height="110" fill="url(#glass)" rx="4" stroke="#94a3b8" stroke-width="2"/>
  <!-- Reflection shimmer on window 2 -->
  <rect x="240" y="115" width="15" height="80" fill="white" opacity="0.35" rx="7"/>
  <!-- Window frames -->
  <line x1="105" y1="100" x2="105" y2="210" stroke="#94a3b8" stroke-width="2"/>
  <line x1="30" y1="155" x2="180" y2="155" stroke="#94a3b8" stroke-width="2"/>
  <line x1="295" y1="100" x2="295" y2="210" stroke="#94a3b8" stroke-width="2"/>
  <line x1="220" y1="155" x2="370" y2="155" stroke="#94a3b8" stroke-width="2"/>
  <!-- Water spray drops -->
  <circle cx="140" cy="85" r="3" fill="#38bdf8" opacity="0.8"/>
  <circle cx="150" cy="78" r="2" fill="#38bdf8" opacity="0.6"/>
  <circle cx="155" cy="90" r="2" fill="#38bdf8" opacity="0.7"/>
  <!-- Worker on scaffold (simplified) -->
  <rect x="0" y="225" width="400" height="12" fill="#78716c" rx="2"/>
  <!-- Worker figure -->
  <circle cx="125" cy="218" r="10" fill="#fbbf24"/>
  <rect x="118" y="228" width="14" height="20" fill="#0284c7" rx="3"/>
  <!-- Spray bottle -->
  <rect x="135" y="230" width="9" height="14" fill="#0ea5e9" rx="2"/>
  <path d="M144 232 Q152 228 153 234" stroke="#0369a1" stroke-width="1.5" fill="none"/>
  <!-- Bottom label area -->
  <rect y="255" width="400" height="45" fill="#1e293b" opacity="0.85"/>
  <text x="200" y="283" font-family="Arial,sans-serif" font-size="16" font-weight="bold" fill="white" text-anchor="middle">Vitres &amp; Façades</text>
</svg>
